packages:
  - packages/*

# Transitive-dep pins for security advisories.
# @ungap/structured-clone <1.3.1 — CWE-502 deserialization fix.
overrides:
  "@ungap/structured-clone": ">=1.3.1"

# Supply-chain controls — see jaredwray/agentic defense-in-depth-nodejs.md § 4
minimumReleaseAge: 10080 # 7 days, in minutes
minimumReleaseAgeStrict: true
minimumReleaseAgeIgnoreMissingTime: false
blockExoticSubdeps: true
strictDepBuilds: true
dangerouslyAllowAllBuilds: false
trustPolicy: no-downgrade

minimumReleaseAgeExclude:
  - hookified

# Trust-policy carve-outs for jaredwray-owned packages whose newer releases
# legitimately stopped emitting npm provenance.
trustPolicyExclude:
  - writr

# Approved build scripts — code-reviewed allowlist (replaces onlyBuiltDependencies)
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
  workerd: true
  zeromq: true
